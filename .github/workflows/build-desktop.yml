name: Build desktop

# Packages the Electron client for macOS, Windows, and Linux with
# electron-builder. Installers are uploaded as workflow artifacts (and attached
# to a GitHub Release when triggered by a v* tag).
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            builder: "--linux"
            artifact: linux
          - os: macos-latest
            builder: "--mac"
            artifact: mac
          - os: windows-latest
            builder: "--win"
            artifact: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @surge-manage/shared build

      - name: Build & package
        working-directory: electron
        # --publish never: produce artifacts only, never auto-upload to a provider.
        run: |
          pnpm exec electron-vite build
          pnpm exec electron-builder ${{ matrix.builder }} --publish never
        env:
          # Electron-builder needs a token only when publishing; harmless here.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: surge-manage-${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            electron/release/*.AppImage
            electron/release/*.deb
            electron/release/*.dmg
            electron/release/*.zip
            electron/release/*.exe
            electron/release/*.blockmap
            electron/release/latest*.yml

  release:
    # Attach all platform artifacts to the GitHub Release on a version tag.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
