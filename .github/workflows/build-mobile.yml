name: Build mobile

# Tests the Flutter client and builds an Android APK. The repo keeps only
# lib/test/pubspec under version control, so platform folders are generated on
# the fly with `flutter create` before building.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Test
        run: flutter test

      - name: Generate Android platform files
        run: flutter create --platforms=android --org com.surgemanage .

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: surge-manage-android
          if-no-files-found: error
          path: flutter/build/app/outputs/flutter-apk/app-release.apk
