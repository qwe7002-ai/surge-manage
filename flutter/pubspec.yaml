name: surge_manage
description: Surge Manage — remote management client for the Surge CLI over mosh.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  # shadcn-style component library for Flutter.
  forui: ^0.8.0
  # Pure-Dart SSH client — used to bootstrap mosh-server and (fallback) shell.
  dartssh2: ^2.12.0
  # Secrets (SSH passphrases/passwords) in the platform secure storage.
  flutter_secure_storage: ^9.2.2
  # Lightweight state management.
  provider: ^6.1.2
  uuid: ^4.5.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
